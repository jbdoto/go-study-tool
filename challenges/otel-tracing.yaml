  - id: "otel-1"
    type: fill_blank
    difficulty: hard
    title: "Initialize Trace Provider"
    description: |
      Initialize an OpenTelemetry trace provider with an OTLP gRPC
      exporter. Configure it with a resource that includes the service
      name and version. The trace provider should use a batch span
      processor for efficient export.
    scaffold: |
      package tracing

      import (
          "context"

          "go.opentelemetry.io/otel"
          "go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracegrpc"
          "go.opentelemetry.io/otel/sdk/resource"
          sdktrace "go.opentelemetry.io/otel/sdk/trace"
          semconv "go.opentelemetry.io/otel/semconv/v1.21.0"
      )

      func InitTracer(ctx context.Context, serviceName, version string) (*sdktrace.TracerProvider, error) {
          // TODO: Create an OTLP gRPC exporter using otlptracegrpc.New

          // TODO: Create a resource with service name and version
          // using resource.NewWithAttributes and semconv constants

          // TODO: Create a TracerProvider with:
          //   - A BatchSpanProcessor wrapping the exporter
          //   - The resource you created

          // TODO: Set the global tracer provider using otel.SetTracerProvider

          // TODO: Return the provider
      }
    solution: |
      package tracing

      import (
          "context"

          "go.opentelemetry.io/otel"
          "go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracegrpc"
          "go.opentelemetry.io/otel/sdk/resource"
          sdktrace "go.opentelemetry.io/otel/sdk/trace"
          semconv "go.opentelemetry.io/otel/semconv/v1.21.0"
      )

      func InitTracer(ctx context.Context, serviceName, version string) (*sdktrace.TracerProvider, error) {
          exporter, err := otlptracegrpc.New(ctx)
          if err != nil {
              return nil, err
          }

          res, err := resource.NewWithAttributes(
              semconv.SchemaURL,
              semconv.ServiceName(serviceName),
              semconv.ServiceVersion(version),
          )
          if err != nil {
              return nil, err
          }

          tp := sdktrace.NewTracerProvider(
              sdktrace.WithBatcher(exporter),
              sdktrace.WithResource(res),
          )

          otel.SetTracerProvider(tp)

          return tp, nil
      }
    hints:
      - "otlptracegrpc.New(ctx) creates an exporter that sends spans to an OTLP collector via gRPC"
      - "sdktrace.WithBatcher wraps the exporter in a batch processor for efficient export"
    key_concepts:
      - "TracerProvider"
      - "OTLP exporter"
      - "Resource attributes"

