          // unary and stream interceptors using otelgrpc
          // Also use insecure credentials for this example
      }
    solution: |
      package client

      import (
          "google.golang.org/grpc"
          "google.golang.org/grpc/credentials/insecure"
          "go.opentelemetry.io/contrib/instrumentation/google.golang.org/grpc/otelgrpc"
      )

      func NewTracedConnection(addr string) (*grpc.ClientConn, error) {
          conn, err := grpc.Dial(addr,
              grpc.WithTransportCredentials(insecure.NewCredentials()),
              grpc.WithUnaryInterceptor(otelgrpc.UnaryClientInterceptor()),
              grpc.WithStreamInterceptor(otelgrpc.StreamClientInterceptor()),
          )
          if err != nil {
              return nil, err
          }
          return conn, nil
      }
    hints:
      - "otelgrpc.UnaryClientInterceptor() returns a ready-to-use unary interceptor"
      - "Use grpc.WithUnaryInterceptor and grpc.WithStreamInterceptor as dial options"
    key_concepts:
      - "otelgrpc interceptors"
      - "Span propagation"
      - "Trace context"
