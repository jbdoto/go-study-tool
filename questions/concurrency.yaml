chapter: concurrency
title: "Concurrency"
source_url: "https://quii.gitbook.io/learn-go-with-tests/go-fundamentals/concurrency"
questions:
  - id: "conc-mc-1"
    type: multiple_choice
    difficulty: easy
    text: "How do you start a goroutine in Go?"
    correct: "Use the go keyword before a function call: go doSomething()"
    wrong:
      - "Use goroutine.Start(doSomething)"
      - "Use async doSomething()"
      - "Use spawn(doSomething)"
      - "Use thread.Run(doSomething)"
      - "Use concurrent(doSomething)"
    explanation: "The go keyword is all you need. go f() starts f running concurrently with the calling goroutine."
    source_anchor: "write-enough-code-to-make-it-pass"

  - id: "conc-mc-2"
    type: multiple_choice
    difficulty: medium
    text: "What is a channel in Go?"
    correct: "A typed conduit for sending and receiving values between goroutines safely"
    wrong:
      - "A thread-safe queue from the sync package"
      - "A file descriptor for inter-process communication"
      - "A buffered I/O wrapper for network sockets"
      - "A logging mechanism for concurrent code"
      - "A mutex that can hold a value"
    explanation: "Channels enable goroutines to communicate by sending and receiving values. They synchronize access, preventing race conditions."
    source_anchor: "write-enough-code-to-make-it-pass"

  - id: "conc-mc-3"
    type: multiple_choice
    difficulty: easy
    text: "What does the <- operator do with channels?"
    correct: "Sends a value to a channel (ch <- v) or receives from a channel (v := <-ch)"
    wrong:
      - "Compares two channel values"
      - "Closes a channel"
      - "Creates a new channel"
      - "Checks if a channel is empty"
      - "Converts a channel to a slice"
    explanation: "The <- arrow indicates direction: ch <- value sends, value := <-ch receives. The direction relative to the channel determines the operation."
    source_anchor: "write-enough-code-to-make-it-pass"

  - id: "conc-mc-4"
    type: multiple_choice
    difficulty: hard
    text: "Why can't multiple goroutines safely write to a regular map concurrently?"
    correct: "Maps are not safe for concurrent writes — it causes a fatal error at runtime"
    wrong:
      - "Maps use copy-on-write so writes are lost silently"
      - "The Go compiler prevents compiling concurrent map writes"
      - "Maps automatically serialize writes, making them slow"
      - "Maps are immutable in Go"
      - "Maps lock automatically but may deadlock"
    explanation: "Go's runtime detects concurrent map writes and crashes with a fatal error. Use channels or sync.Mutex to protect shared maps."
    source_anchor: "write-enough-code-to-make-it-pass"

  - id: "conc-mc-5"
    type: multiple_choice
    difficulty: medium
    text: "What Go test flag detects race conditions?"
    correct: "go test -race"
    wrong:
      - "go test -concurrent"
      - "go test -detect-race"
      - "go test -safe"
      - "go vet -race"
      - "go test -goroutine-check"
    explanation: "The -race flag enables Go's built-in race detector, which monitors memory access at runtime and reports data races."
    source_anchor: "write-enough-code-to-make-it-pass"

  - id: "conc-mc-6"
    type: multiple_choice
    difficulty: easy
    text: "What is an anonymous function in Go?"
    correct: "A function literal with no name, often declared and called inline"
    wrong:
      - "A function that accepts interface{} parameters"
      - "A function defined inside a test file"
      - "A private function starting with a lowercase letter"
      - "A function generated by the compiler"
      - "A function that returns no value"
    explanation: "Anonymous functions are declared inline: go func() { ... }(). They can capture variables from their enclosing scope (closures)."
    source_anchor: "write-enough-code-to-make-it-pass"

  - id: "conc-mc-7"
    type: multiple_choice
    difficulty: medium
    text: "What development philosophy does the chapter recommend for optimization?"
    correct: "Make it work, make it right, make it fast — only optimize after correctness is established"
    wrong:
      - "Always optimize from the start to avoid having to refactor for performance later"
      - "Write benchmarks first before any implementation to establish performance baselines"
      - "Avoid goroutines entirely until CPU profiling proves concurrency is needed"
      - "Use the fastest algorithm available even if it makes the code harder to test"
      - "Premature optimization is acceptable as long as you have good test coverage"
    explanation: "The chapter emphasizes getting working, tested code first, then using benchmarks to guide optimization — not the other way around."
    source_anchor: "wrapping-up"

  - id: "conc-mc-8"
    type: multiple_choice
    difficulty: medium
    text: "How do you create a channel in Go?"
    correct: "ch := make(chan Type)"
    wrong:
      - "ch := new(chan Type)"
      - "ch := chan Type{}"
      - "var ch chan Type = channel.New()"
      - "ch := Channel[Type]{}"
      - "ch := create(chan Type)"
    explanation: "Channels must be created with make. A nil channel (declared with var but not initialized) blocks forever on send and receive."
    source_anchor: "write-enough-code-to-make-it-pass"
