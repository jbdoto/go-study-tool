{{define "content"}}
<h1>{{.SetTitle}}</h1>

<div style="margin-bottom: 1.5rem;">
    <small>Challenge {{add .Index 1}} of {{.Total}}</small>
    <progress value="{{.Index}}" max="{{.Total}}" style="width: 100%;"></progress>
</div>

<div class="question-block">
    <h3>{{.Challenge.Title}} <span class="difficulty">{{.Challenge.Difficulty}}</span></h3>
    <p style="white-space: pre-wrap;">{{.Challenge.Description}}</p>

    <div class="key-concepts">
        {{range .Challenge.KeyConcepts}}<span>{{.}}</span>{{end}}
    </div>

    <script id="scaffold-data" type="application/json">{{.ScaffoldJSON}}</script>
    <div id="editor-container"></div>

    <div class="btn-group">
        <button onclick="checkSyntax()" class="secondary">Check Syntax</button>
        <button onclick="showHint()" class="secondary outline">Show Hint</button>
        <button onclick="showSolution()" class="contrast outline">Show Solution</button>
        {{if .IsLast}}
        <a href="/" role="button">Done</a>
        {{else}}
        <a href="/challenges/{{.SetSlug}}/solve?order={{.Order}}&i={{add .Index 1}}" role="button">Next Challenge</a>
        {{end}}
    </div>

    <div id="check-result"></div>
    <div id="hints"></div>
    <div id="solution"></div>
</div>

<script>
function postAndRender(url, params, targetId, swap) {
    fetch(url, {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: new URLSearchParams(params).toString()
    })
    .then(function(r) { return r.text(); })
    .then(function(html) {
        var el = document.getElementById(targetId);
        if (swap === 'beforeend') {
            el.insertAdjacentHTML('beforeend', html);
        } else {
            el.innerHTML = html;
        }
    });
}

function checkSyntax() {
    var code = window.editor ? window.editor.getValue() : '';
    postAndRender('/challenges/{{.SetSlug}}/check', {code: code}, 'check-result', 'innerHTML');
}

function showHint() {
    var shown = document.querySelectorAll('.hint-box').length;
    postAndRender('/challenges/{{.SetSlug}}/hint', {shown: shown, challenge_id: '{{.Challenge.ID}}'}, 'hints', 'beforeend');
}

function showSolution() {
    postAndRender('/challenges/{{.SetSlug}}/solution', {challenge_id: '{{.Challenge.ID}}'}, 'solution', 'innerHTML');
}
</script>
{{end}}
